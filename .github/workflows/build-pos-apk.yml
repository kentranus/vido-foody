name: Build Vido Foody POS APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  backend-check:
    name: Node Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vido-foody-backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install

      - run: node --check src/server.js

  build-pos-apk:
    name: Build POS APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Remove stale Flutter sample test if present
        working-directory: vido-foody-flutter
        run: rm -f test/widget_test.dart

      - name: Install Flutter dependencies
        working-directory: vido-foody-flutter
        run: flutter pub get

      - name: Analyze Flutter POS app
        working-directory: vido-foody-flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Android POS APK
        working-directory: vido-foody-flutter
        run: flutter build apk --release

      - name: Upload POS APK
        uses: actions/upload-artifact@v6
        with:
          name: vido-foody-pos-apk
          path: vido-foody-flutter/build/app/outputs/flutter-apk/app-release.apk
