name: Build Vido Foody POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-backend:
    name: Node Backend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install backend dependencies
        working-directory: vido-foody-backend
        run: npm install

      - name: Backend syntax check
        working-directory: vido-foody-backend
        run: node --check src/server.js

  build-pos-apk:
    name: Build POS APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter platform files if needed
        working-directory: vido-foody-flutter
        run: flutter create .

      - name: Remove generated sample test
        working-directory: vido-foody-flutter
        run: rm -f test/widget_test.dart

      - name: Install Flutter dependencies
        working-directory: vido-foody-flutter
        run: flutter pub get

      - name: Analyze Flutter POS app
        working-directory: vido-foody-flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Android POS APK
        working-directory: vido-foody-flutter
        run: flutter build apk --debug

      - name: Upload POS APK
        uses: actions/upload-artifact@v5
        with:
          name: vido-foody-pos-debug-apk
          path: vido-foody-flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
